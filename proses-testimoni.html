<title>Konfirmasi Testimoni</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* BODY */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#ffe6f0;
color:#333;
}

/* NAVBAR */
nav{
display:flex;
justify-content:center;
gap:30px;
background:linear-gradient(90deg,#ff9ecf,#d8bfd8);
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
animation:navMasuk 0.8s ease;
}

nav a{
text-decoration:none;
color:white;
font-weight:bold;
font-size:17px;
position:relative;
transition:0.3s;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
left:0;
bottom:-5px;
background:white;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
transform:scale(1.1);
}

/* MAIN BOX */
main.konfirmasi{
max-width:700px;
margin:60px auto;
padding:30px;
background:#fff0f6;
border-radius:20px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
animation:muncul 1s ease;
}

/* TEXT */
main h1{
color:#ff4fa3;
margin-bottom:10px;
animation:fadeAtas 1s ease;
}

main h1:nth-child(2){
font-size:20px;
font-weight:500;
}

/* LINK BUTTON */
main a{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#ff9ecf;
color:white;
text-decoration:none;
border-radius:20px;
transition:0.3s;
}

main a:hover{
background:#ff7fbf;
transform:scale(1.05);
box-shadow:0 6px 15px rgba(255,127,191,0.4);
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#ff9ecf;
color:white;
margin-top:50px;
animation:footerMasuk 1.3s ease;
}

/* ANIMATIONS */

@keyframes navMasuk{
from{
opacity:0;
transform:translateY(-50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes muncul{
from{
opacity:0;
transform:translateY(60px) scale(0.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes fadeAtas{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes footerMasuk{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
